<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLYYYBROTALL.ORG</title>
    <style>
        /* 4CHAN BRUTALIST PURE WHITE THEME */
        body { 
            background-color: #ffffff; 
            color: #000000; 
            font-family: arial, helvetica, sans-serif; 
            font-size: 13px; 
            margin: 10px;
        }
        
        a { color: #34345c; text-decoration: none; cursor: pointer; }
        a:hover { color: #dd0000; }
        hr { border: none; border-top: 1px solid #b7c5d9; height: 1px; margin: 10px 0; }
        
        /* HEADER / LOGO */
        .board-title { 
            text-align: center; 
            color: #af0a0f; 
            font-size: 28px; 
            font-weight: bold; 
            margin: 20px 0; 
            letter-spacing: 2px; 
            font-family: impact, arial, sans-serif;
        }

        /* COMPOSE FORM (KOTAK KOMENTAR) */
        .postForm-container { text-align: center; margin-bottom: 20px; }
        .postForm { 
            display: inline-table; 
            background: #eaebf1; 
            border: 1px solid #b7c5d9; 
            padding: 5px; 
            text-align: left;
        }
        .form-row { display: table-row; }
        .form-label { 
            display: table-cell; 
            font-weight: bold; 
            padding: 5px 10px; 
            color: #484852; 
            vertical-align: top;
        }
        .form-input { display: table-cell; padding: 2px; }
        input[type="text"], textarea { 
            border: 1px solid #aaa; 
            padding: 3px; 
            font-family: arial, sans-serif; 
            font-size: 13px; 
            width: 100%;
            box-sizing: border-box;
        }
        textarea { resize: vertical; min-width: 250px; }
        button { cursor: pointer; padding: 2px 6px; font-size: 12px; }
        
        #replyBadge { display: none; color: #ff0000; font-weight: bold; margin-bottom: 10px; }
        .img-status { font-size: 11px; margin-left: 5px; color: #555; }

        /* POST FEED LAYOUT */
        .post-thread { margin-bottom: 20px; }
        .post-header { margin-bottom: 5px; font-size: 12px; }
        .post-name { color: #117743; font-weight: bold; }
        .post-time { margin: 0 5px; }
        .post-id { color: #000000; }
        
        /* MAIN POST VS REPLY (WARNA BACKGROUND BEDA KAYAK 4CHAN) */
        .post-main { display: block; margin-bottom: 5px; }
        .post-reply { 
            background: #d6daf0; 
            border: 1px solid #b7c5d9; 
            padding: 5px 10px; 
            margin-top: 5px; 
            margin-left: 20px; 
            display: table; /* Agar kotak menyesuaikan isi teks */
            max-width: 90%;
        }

        .post-image { 
            max-width: 250px; 
            max-height: 250px; 
            float: left; 
            margin: 5px 15px 10px 0; 
            border: 1px solid #000;
        }
        .post-text { margin-top: 5px; line-height: 1.4em; white-space: pre-wrap; word-wrap: break-word; }
        .clear { clear: both; }

        /* MOBILE RESPONSIVE ADJUSTMENTS */
        @media only screen and (max-width: 600px) {
            .postForm { display: block; width: 100%; }
            .form-label, .form-input { display: block; width: 100%; }
            .post-reply { margin-left: 10px; display: block; }
            .post-image { max-width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <div class="board-title">HOLYYYBROTALL</div>
    <hr>

    <!-- FORM INPUT -->
    <div class="postForm-container">
        <div id="replyBadge">
            Membalas No.<span id="replyToId"></span> 
            <button type="button" onclick="batalReply()">[Batal]</button>
        </div>
        
        <form id="postForm" class="postForm">
            <input type="hidden" id="parent_id" value="">
            <input type="hidden" id="linkGambarInput" value="">
            
            <div class="form-row">
                <div class="form-label">Name</div>
                <div class="form-input">
                    <input type="text" id="namaInput" placeholder="Anonymous">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-label">Comment</div>
                <div class="form-input">
                    <textarea id="kontenInput" rows="4" cols="50" required></textarea>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-label">File</div>
                <div class="form-input">
                    <button type="button" onclick="masukkanGambar()">[Insert Image URL]</button>
                    <span id="imgStatus" class="img-status">No file</span>
                    <button type="button" id="hapusImgBtn" style="display:none;" onclick="hapusGambar()">[X]</button>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-label"></div>
                <div class="form-input" style="padding-top: 5px;">
                    <button type="submit" id="btnKirim">Post</button>
                </div>
            </div>
        </form>
    </div>
    <hr>

    <!-- FEED TULISAN -->
    <div id="feedArea">
        Loading...
    </div>

    <script>
        const API_URL = "https://ckblychtergzhqmioahi.supabase.co/rest/v1/forum";
        const API_KEY = "sb_publishable_QNF3cmBH8_OmxPA8YFAHoQ_unB40-Ds";

        // LOGIKA INSERT IMAGE VIA PROMPT POPUP
        function masukkanGambar() {
            let url = prompt("Paste URL gambar di sini:");
            if (url && url.trim() !== "") {
                document.getElementById('linkGambarInput').value = url.trim();
                document.getElementById('imgStatus').innerText = "Image attached";
                document.getElementById('hapusImgBtn').style.display = "inline";
            }
        }

        function hapusGambar() {
            document.getElementById('linkGambarInput').value = "";
            document.getElementById('imgStatus').innerText = "No file";
            document.getElementById('hapusImgBtn').style.display = "none";
        }

        // FUNGSI MEMBALAS (REPLY)
        function klikReply(idTarget) {
            document.getElementById('parent_id').value = idTarget;
            document.getElementById('replyToId').innerText = idTarget;
            document.getElementById('replyBadge').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('kontenInput').focus();
        }

        function batalReply() {
            document.getElementById('parent_id').value = "";
            document.getElementById('replyBadge').style.display = "none";
        }

        // FUNGSI RENDER POST ALA 4CHAN
        function renderPostHtml(post, isReply = false) {
            let nama = post.nama && post.nama.trim() !== "" ? post.nama : "Anonymous";
            let timeStr = new Date(post.created_at).toLocaleDateString('en-GB', {day: '2-digit', month: '2-digit', year: '2-digit'}) + " " + new Date(post.created_at).toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
            
            let imgHtml = post.gambar ? `<a href="${post.gambar}" target="_blank"><img src="${post.gambar}" class="post-image" onerror="this.style.display='none'"></a>` : '';
            
            // Post utama gak ada background, Reply ada background kotak
            let containerClass = isReply ? "post-reply" : "post-main";
            
            return `
                <div class="${containerClass}" id="p${post.id}">
                    <div class="post-header">
                        <span class="post-name">${nama}</span> 
                        <span class="post-time">${timeStr}</span> 
                        <span class="post-id">No.${post.id}</span>
                        <a class="reply-btn" onclick="klikReply(${isReply ? post.parent_id : post.id})">[Reply]</a>
                    </div>
                    ${imgHtml}
                    <div class="post-text">${post.konten}</div>
                    <div class="clear"></div>
                </div>
            `;
        }

        // FUNGSI UTAMA AMBIL DATA
        async function ambilTulisan() {
            try {
                const response = await fetch(`${API_URL}?select=*`, {
                    method: "GET",
                    headers: { "apikey": API_KEY, "Authorization": `Bearer ${API_KEY}` }
                });

                if (!response.ok) throw new Error("Gagal mengambil data");
                const data = await response.json();

                const feedArea = document.getElementById('feedArea');
                if (data.length === 0) {
                    feedArea.innerHTML = "Not found.";
                    return;
                }

                // Main posts diurutkan dari yang terbaru, Balasan dari yang terlama
                const mainPosts = data.filter(t => !t.parent_id).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                const allReplies = data.filter(t => t.parent_id);

                let html = "";
                mainPosts.forEach(main => {
                    html += `<div class="post-thread">`;
                    html += renderPostHtml(main, false);
                    
                    const balasannya = allReplies.filter(r => r.parent_id === main.id).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                    
                    balasannya.forEach(reply => {
                        html += renderPostHtml(reply, true);
                    });
                    
                    html += `</div><hr>`;
                });

                feedArea.innerHTML = html;
            } catch (error) {
                document.getElementById('feedArea').innerHTML = "Database error.";
            }
        }

        // FUNGSI UTAMA KIRIM DATA
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let btnKirim = document.getElementById('btnKirim');
            btnKirim.disabled = true;

            let nama = document.getElementById('namaInput').value;
            let konten = document.getElementById('kontenInput').value;
            let linkGambar = document.getElementById('linkGambarInput').value;
            
            if(linkGambar === "") linkGambar = null;

            let parentIdVal = document.getElementById('parent_id').value;
            let parent_id = parentIdVal === "" ? null : parseInt(parentIdVal);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "apikey": API_KEY,
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({ 
                        nama: nama, 
                        konten: konten, 
                        parent_id: parent_id,
                        gambar: linkGambar
                    })
                });

                if (!response.ok) throw new Error("Gagal");

                document.getElementById('kontenInput').value = ''; 
                hapusGambar();
                batalReply();
                ambilTulisan(); 
                
            } catch (error) {
                alert("Error.");
            } finally {
                btnKirim.disabled = false;
            }
        });

        ambilTulisan();
    </script>
</body>
</html>
